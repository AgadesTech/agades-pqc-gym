year: 2022
url: "https://eprint.iacr.org/2022/975"
family: "ISOGENY_HISTORICAL"
relevance: "Future historical-isogeny adapters should represent SIDH/SIKE lessons as bounded historical reconstruction fixtures, not as current PQC security claims."
key_ideas:
  - "Historical isogeny attacks belong in a separate plugin with explicit non-current-standard boundaries."
  - "Toy path reconstruction fixtures can test routing and reporting without solving real isogeny problems."
  - "Reports must prevent historical break narratives from being projected onto unrelated current standards."
operators_suggested:
