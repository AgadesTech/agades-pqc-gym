relevance: "Future implementation-security hooks should propose KAT, timing, and benchmark-harness work only through pinned public artifacts and explicit no-execution review gates."
key_ideas:
  - "KAT and ACVP-style vector checks are correctness evidence, not cryptanalytic evidence."
  - "Timing and benchmark summaries are environment-specific unless device, toolchain, runner, and provenance are pinned."
  - "The public verifier must stay JSON-only until an isolated runner and redaction protocol exist."
