name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Run tests
        run: uv run --extra dev pytest -q
      - name: Run lint
        run: uv run --extra dev ruff check .
